<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lecture Timetable Manager - Column Clash</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        /* [Keep all the existing CSS styles - they're good] */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            padding: 20px;
            min-height: 100vh;
        }

        .container {
            max-width: 95%;
            margin: 0 auto;
            background: white;
            border-radius: 12px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.2);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 32px;
            margin-bottom: 10px;
        }

        .controls {
            padding: 20px;
            background: #f8f9fa;
            border-bottom: 2px solid #dee2e6;
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            align-items: center;
        }

        .control-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .control-group label {
            font-size: 13px;
            font-weight: 600;
            color: #495057;
            text-transform: uppercase;
        }

        select, input, button {
            padding: 12px 18px;
            border: 2px solid #dee2e6;
            border-radius: 6px;
            font-size: 15px;
            transition: all 0.3s;
        }

        select:focus, input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        button {
            background: #667eea;
            color: white;
            border: none;
            cursor: pointer;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        button:hover {
            background: #5568d3;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.3);
        }

        button.secondary {
            background: #6c757d;
        }

        button.secondary:hover {
            background: #5a6268;
        }

        button.danger {
            background: #dc3545;
        }

        button.danger:hover {
            background: #c82333;
        }

        button.success {
            background: #28a745;
        }

        button.success:hover {
            background: #218838;
        }

        button.info {
            background: #17a2b8;
        }

        button.info:hover {
            background: #138496;
        }

        .table-wrapper {
            overflow-x: auto;
            padding: 20px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 14px;
        }

        th {
            background: #495057;
            color: white;
            padding: 14px 10px;
            text-align: center;
            font-weight: 600;
            position: sticky;
            top: 0;
            z-index: 10;
            font-size: 14px;
        }

        th.time-col {
            background: #343a40;
        }

        td {
            border: 1px solid #dee2e6;
            padding: 10px;
            text-align: center;
            vertical-align: top;
            min-width: 140px;
            cursor: pointer;
            transition: all 0.2s;
        }

        td:hover {
            background: #f8f9fa;
            box-shadow: inset 0 0 0 2px #667eea;
        }

        .time-col {
            background: #e9ecef;
            font-weight: 600;
            color: #495057;
            min-width: 160px;
            font-size: 14px;
        }

        .no-clashing {
            background: #d4edda;
        }

        .clashing {
            background: #f8d7da;
        }

        .lecture-subject {
            font-weight: 700;
            color: #2c3e50;
            margin-bottom: 4px;
            text-transform: uppercase;
            font-size: 13px;
        }

        .lecture-faculty {
            color: #7f8c8d;
            font-size: 12px;
        }

        .lecture-days {
            color: #3498db;
            font-size: 11px;
            margin-top: 3px;
            font-weight: 600;
        }

        .subject-block {
            padding: 5px;
            border-bottom: 1px dashed #dee2e6;
        }

        .subject-block:last-child {
            border-bottom: none;
        }

        .highlight {
            background: #fff3cd !important;
            border: 2px solid #ffc107 !important;
            font-weight: bold;
        }

        .stats {
            padding: 20px;
            background: #f8f9fa;
            border-top: 2px solid #dee2e6;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 15px;
        }

        .stat-card {
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            text-align: center;
        }

        .stat-card h3 {
            font-size: 14px;
            color: #6c757d;
            margin-bottom: 10px;
            text-transform: uppercase;
            font-weight: 600;
        }

        .stat-card .value {
            font-size: 32px;
            font-weight: bold;
            color: #667eea;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.6);
            z-index: 1000;
            overflow-y: auto;
        }

        .modal.active {
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .modal-content {
            background: white;
            border-radius: 12px;
            max-width: 700px;
            width: 90%;
            max-height: 90vh;
            overflow-y: auto;
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
        }

        .modal-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 12px 12px 0 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .modal-header h2 {
            font-size: 22px;
        }

        .modal-close {
            background: rgba(255,255,255,0.2);
            border: none;
            color: white;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .modal-close:hover {
            background: rgba(255,255,255,0.3);
        }

        .modal-body {
            padding: 30px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #495057;
        }

        .form-group input,
        .form-group select {
            width: 100%;
        }

        .subject-entry {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 15px;
            border: 2px solid #dee2e6;
        }

        .faculty-day-entry {
            background: white;
            padding: 12px;
            border-radius: 6px;
            margin-top: 10px;
            border: 1px solid #dee2e6;
        }

        .faculty-day-entry h4 {
            font-size: 13px;
            margin-bottom: 10px;
            color: #495057;
        }

        .checkbox-group {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 8px;
        }

        .checkbox-group label {
            display: flex;
            align-items: center;
            gap: 5px;
            padding: 6px 12px;
            background: #e9ecef;
            border-radius: 4px;
            cursor: pointer;
            font-weight: normal;
            font-size: 13px;
        }

        .checkbox-group input[type="checkbox"] {
            width: auto;
        }

        .remove-btn {
            background: #dc3545;
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
            margin-top: 8px;
        }

        .remove-btn:hover {
            background: #c82333;
        }

        .add-btn {
            background: #28a745;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 4px;
            cursor: pointer;
            margin-top: 10px;
            font-size: 13px;
        }

        .add-btn:hover {
            background: #218838;
        }

        #exportContent {
            display: none;
        }

        .export-header {
            text-align: center;
            background: #667eea;
            color: white;
            padding: 20px;
            margin-bottom: 20px;
        }

        .export-header h1 {
            font-size: 28px;
            margin-bottom: 5px;
        }

        @media print {
            body {
                background: white;
                padding: 0;
            }
            .controls, .stats, button {
                display: none !important;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📚 Lecture Timetable Manager (Column Clash Detection)</h1>
            <p>Manage your nursing college lecture schedule with faculty and day-wise assignments</p>
        </div>

        <div class="controls">
            <button onclick="manageFaculty()" class="secondary">
                <span>👤</span> Manage Faculty
            </button>
            
            <div class="control-group">
                <label>Filter by Faculty</label>
                <select id="facultyFilter">
                    <option value="">All Faculty</option>
                </select>
            </div>

            <div class="control-group">
                <label>Filter by Section</label>
                <select id="sectionFilter">
                    <option value="">All Sections</option>
                </select>
            </div>

            <div class="control-group">
                <label>Search Subject</label>
                <input type="text" id="subjectFilter" placeholder="Type subject name...">
            </div>

            <button onclick="exportToPDF()" class="success">
                <span>📄</span> Export PDF
            </button>

            <button onclick="exportToWord()" class="info">
                <span>📝</span> Export Word
            </button>

            <button onclick="exportToCSV()" class="secondary">
                <span>💾</span> Export CSV
            </button>

            <button onclick="importFromCSV()" class="secondary">
                <span>📂</span> Import CSV
            </button>

            <button onclick="resetTimetable()" class="danger">
                <span>🗑️</span> Reset All
            </button>
        </div>

        <div class="table-wrapper">
            <table id="timetable"></table>
        </div>

        <div class="stats" id="stats"></div>
    </div>

    <!-- Lecture Modal -->
    <div id="lectureModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modalTitle">Add/Edit Lecture</h2>
                <button class="modal-close" onclick="closeModal()">×</button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label>Section</label>
                    <input type="text" id="modalSection" disabled>
                </div>
                <div class="form-group">
                    <label>Time Slot</label>
                    <input type="text" id="modalTimeSlot" disabled>
                </div>
                
                <div id="subjectsContainer"></div>
                
                <button class="add-btn" onclick="addSubject()">+ Add Subject</button>
                
                <div style="margin-top: 30px; display: flex; gap: 10px;">
                    <button onclick="saveLecture()" style="flex: 1;">Save Lecture</button>
                    <button onclick="deleteLecture()" class="danger" id="deleteBtn" style="flex: 1;">Delete Lecture</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Faculty Management Modal -->
    <div id="facultyModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Manage Faculty</h2>
                <button class="modal-close" onclick="closeFacultyModal()">×</button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label>Add New Faculty</label>
                    <div style="display: flex; gap: 10px;">
                        <input type="text" id="newFacultyName" placeholder="Enter faculty name" style="flex: 1;">
                        <button onclick="addFaculty()" class="success">Add</button>
                    </div>
                </div>
                
                <div class="form-group">
                    <label>Current Faculty List</label>
                    <div id="facultyList" style="background: #f8f9fa; padding: 15px; border-radius: 8px; max-height: 300px; overflow-y: auto;"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- Export Content (Hidden) -->
    <div id="exportContent">
        <div class="export-header">
            <h1>Lecture Timetable</h1>
            <p>Generated on: <span id="exportDate"></span></p>
        </div>
        <table id="exportTable"></table>
    </div>

    <input type="file" id="csvInput" accept=".csv" style="display:none" onchange="handleCSVImport(event)">

    <script>
        // ============= DATA STRUCTURES =============
        let timetableData = [];
        let facultyList = ['Dr. Smith', 'Prof. Johnson', 'Dr. Williams'];
        
        const sections = [
            'B.Sc. Nursing 1st Year A',
            'B.Sc. Nursing 1st Year B',
            'B.Sc. Nursing 2nd Year A',
            'B.Sc. Nursing 2nd Year B',
            'B.Sc. Nursing 3rd Year A',
            'B.Sc. Nursing 3rd Year B',
            'B.Sc. Nursing 4th Year A',
            'B.Sc. Nursing 4th Year B',
            'GNM 1st Year',
            'GNM 2nd Year',
            'GNM 3rd Year',
            'ANM 1st Year',
            'ANM 2nd Year'
        ];

        const timeSlots = [
            '08:00 - 09:00',
            '09:00 - 10:00',
            '10:00 - 11:00',
            '11:00 - 12:00',
            '12:00 - 13:00',
            '13:00 - 14:00',
            '14:00 - 15:00',
            '15:00 - 16:00'
        ];

        const weekDays = ['Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday'];

        let currentEditingCell = null;
        let filteredData = [];

        // ============= INITIALIZATION =============
        function init() {
            loadFromStorage();
            renderTimetable();
            updateStats();
            populateFacultyFilter();
            populateSectionFilter();
        }

        function populateFacultyFilter() {
            const select = document.getElementById('facultyFilter');
            select.innerHTML = '<option value="">All Faculty</option>';
            facultyList.forEach(faculty => {
                const option = document.createElement('option');
                option.value = faculty;
                option.textContent = faculty;
                select.appendChild(option);
            });
        }

        function populateSectionFilter() {
            const select = document.getElementById('sectionFilter');
            select.innerHTML = '<option value="">All Sections</option>';
            sections.forEach(section => {
                const option = document.createElement('option');
                option.value = section;
                option.textContent = section;
                select.appendChild(option);
            });
        }

        // ============= RENDERING =============
        function renderTimetable() {
            const table = document.getElementById('timetable');
            table.innerHTML = '';
            
            const thead = document.createElement('thead');
            const headerRow = document.createElement('tr');
            headerRow.innerHTML = `<th class="time-col">Class / Time</th>`;
            
            timeSlots.forEach(time => {
                const th = document.createElement('th');
                th.textContent = time;
                headerRow.appendChild(th);
            });
            thead.appendChild(headerRow);
            table.appendChild(thead);

            const tbody = document.createElement('tbody');
            
            const displaySections = filteredData.length > 0 
                ? [...new Set(filteredData.map(l => l.section))]
                : sections;

            displaySections.forEach(section => {
                const row = document.createElement('tr');
                const sectionCell = document.createElement('td');
                sectionCell.className = 'time-col';
                sectionCell.textContent = section;
                row.appendChild(sectionCell);

                timeSlots.forEach((time, timeIndex) => {
                    const cell = document.createElement('td');
                    const lecture = (filteredData.length > 0 ? filteredData : timetableData)
                        .find(l => l.section === section && l.timeSlot === timeIndex);

                    if (lecture) {
                        cell.className = lecture.clashing ? 'clashing' : 'no-clashing';
                        
                        if (lecture.subjects && lecture.subjects.length > 0) {
                            lecture.subjects.forEach((subj, idx) => {
                                const subjectBlock = document.createElement('div');
                                subjectBlock.className = 'subject-block';
                                
                                const subjectName = document.createElement('div');
                                subjectName.className = 'lecture-subject';
                                subjectName.textContent = subj.name;
                                subjectBlock.appendChild(subjectName);

                                if (subj.facultyDays && subj.facultyDays.length > 0) {
                                    subj.facultyDays.forEach(fd => {
                                        const facultyDiv = document.createElement('div');
                                        facultyDiv.className = 'lecture-faculty';
                                        facultyDiv.textContent = fd.faculty;
                                        
                                        if (fd.days && fd.days.length > 0) {
                                            const daysDiv = document.createElement('div');
                                            daysDiv.className = 'lecture-days';
                                            daysDiv.textContent = fd.days.join(', ');
                                            facultyDiv.appendChild(daysDiv);
                                        }
                                        
                                        subjectBlock.appendChild(facultyDiv);
                                    });
                                }
                                
                                cell.appendChild(subjectBlock);
                            });
                        }
                    }

                    cell.addEventListener('click', () => openModal(section, timeIndex));
                    row.appendChild(cell);
                });

                tbody.appendChild(row);
            });

            table.appendChild(tbody);
        }

        // ============= MODAL FUNCTIONS =============
        function openModal(section, timeSlot) {
            currentEditingCell = {section, timeSlot};
            const lecture = timetableData.find(l => l.section === section && l.timeSlot === timeSlot);

            document.getElementById('modalSection').value = section;
            document.getElementById('modalTimeSlot').value = timeSlots[timeSlot];
            document.getElementById('modalTitle').textContent = lecture ? 'Edit Lecture' : 'Add Lecture';
            document.getElementById('deleteBtn').style.display = lecture ? 'block' : 'none';

            renderSubjects(lecture ? lecture.subjects : []);
            document.getElementById('lectureModal').classList.add('active');
        }

        function closeModal() {
            document.getElementById('lectureModal').classList.remove('active');
            currentEditingCell = null;
        }

        function renderSubjects(subjects = []) {
            const container = document.getElementById('subjectsContainer');
            container.innerHTML = '';

            if (subjects.length === 0) {
                subjects = [{name: '', facultyDays: [{faculty: '', days: []}]}];
            }

            subjects.forEach((subject, subjectIndex) => {
                const subjectDiv = document.createElement('div');
                subjectDiv.className = 'subject-entry';
                subjectDiv.innerHTML = `
                    <div class="form-group">
                        <label>Subject Name</label>
                        <input type="text" class="subject-name" value="${subject.name || ''}" placeholder="Enter subject name">
                    </div>
                    <div class="faculty-days-container"></div>
                    <button class="add-btn" onclick="addFacultyDay(${subjectIndex})">+ Add Faculty</button>
                    ${subjects.length > 1 ? `<button class="remove-btn" onclick="removeSubject(${subjectIndex})">Remove Subject</button>` : ''}
                `;
                container.appendChild(subjectDiv);

                const facultyDaysContainer = subjectDiv.querySelector('.faculty-days-container');
                const facultyDays = subject.facultyDays || [{faculty: '', days: []}];

                facultyDays.forEach((fd, fdIndex) => {
                    const fdDiv = document.createElement('div');
                    fdDiv.className = 'faculty-day-entry';
                    fdDiv.innerHTML = `
                        <h4>Faculty Assignment ${fdIndex + 1}</h4>
                        <div class="form-group">
                            <label>Select Faculty</label>
                            <select class="faculty-select">
                                <option value="">Select Faculty</option>
                                ${facultyList.map(f => `<option value="${f}" ${f === fd.faculty ? 'selected' : ''}>${f}</option>`).join('')}
                            </select>
                        </div>
                        <div class="form-group">
                            <label>Select Days (leave empty for all days)</label>
                            <div class="checkbox-group">
                                ${weekDays.map(day => `
                                    <label>
                                        <input type="checkbox" value="${day}" ${(fd.days || []).includes(day) ? 'checked' : ''}>
                                        ${day}
                                    </label>
                                `).join('')}
                            </div>
                        </div>
                        ${facultyDays.length > 1 ? `<button class="remove-btn" onclick="removeFacultyDay(${subjectIndex}, ${fdIndex})">Remove Faculty</button>` : ''}
                    `;
                    facultyDaysContainer.appendChild(fdDiv);
                });
            });
        }

        function addSubject() {
            const container = document.getElementById('subjectsContainer');
            const currentSubjects = Array.from(container.querySelectorAll('.subject-entry'));
            const subjects = currentSubjects.map(getSubjectData);
            subjects.push({name: '', facultyDays: [{faculty: '', days: []}]});
            renderSubjects(subjects);
        }

        function removeSubject(index) {
            const container = document.getElementById('subjectsContainer');
            const currentSubjects = Array.from(container.querySelectorAll('.subject-entry'));
            const subjects = currentSubjects.map(getSubjectData);
            subjects.splice(index, 1);
            renderSubjects(subjects);
        }

        function addFacultyDay(subjectIndex) {
            const container = document.getElementById('subjectsContainer');
            const currentSubjects = Array.from(container.querySelectorAll('.subject-entry'));
            const subjects = currentSubjects.map(getSubjectData);
            subjects[subjectIndex].facultyDays.push({faculty: '', days: []});
            renderSubjects(subjects);
        }

        function removeFacultyDay(subjectIndex, fdIndex) {
            const container = document.getElementById('subjectsContainer');
            const currentSubjects = Array.from(container.querySelectorAll('.subject-entry'));
            const subjects = currentSubjects.map(getSubjectData);
            subjects[subjectIndex].facultyDays.splice(fdIndex, 1);
            renderSubjects(subjects);
        }

        function getSubjectData(subjectDiv) {
            const name = subjectDiv.querySelector('.subject-name').value;
            const facultyDayDivs = subjectDiv.querySelectorAll('.faculty-day-entry');
            
            const facultyDays = Array.from(facultyDayDivs).map(fdDiv => {
                const faculty = fdDiv.querySelector('.faculty-select').value;
                const dayCheckboxes = fdDiv.querySelectorAll('.checkbox-group input[type="checkbox"]:checked');
                const days = Array.from(dayCheckboxes).map(cb => cb.value);
                return {faculty, days};
            }).filter(fd => fd.faculty);

            return {name, facultyDays};
        }

        function saveLecture() {
            if (!currentEditingCell) return;

            const container = document.getElementById('subjectsContainer');
            const subjectDivs = Array.from(container.querySelectorAll('.subject-entry'));
            const subjects = subjectDivs.map(getSubjectData).filter(s => s.name && s.facultyDays.length > 0);

            if (subjects.length === 0) {
                alert('Please add at least one subject with faculty assigned');
                return;
            }

            const existingIndex = timetableData.findIndex(
                l => l.section === currentEditingCell.section && l.timeSlot === currentEditingCell.timeSlot
            );

            if (existingIndex >= 0) {
                timetableData[existingIndex].subjects = subjects;
            } else {
                timetableData.push({
                    section: currentEditingCell.section,
                    timeSlot: currentEditingCell.timeSlot,
                    subjects: subjects,
                    clashing: false
                });
            }

            recalculateAllClashing();
            saveToStorage();
            renderTimetable();
            updateStats();
            closeModal();
        }

        function deleteLecture() {
            if (!currentEditingCell) return;
            if (!confirm('Are you sure you want to delete this lecture?')) return;

            const index = timetableData.findIndex(
                l => l.section === currentEditingCell.section && l.timeSlot === currentEditingCell.timeSlot
            );

            if (index >= 0) {
                timetableData.splice(index, 1);
                recalculateAllClashing();
                saveToStorage();
                renderTimetable();
                updateStats();
                closeModal();
            }
        }

        // ============= CLASHING DETECTION (COLUMN-WISE) =============
        function recalculateAllClashing() {
            // Group lectures by section (column-wise)
            const lecturesBySection = {};
            timetableData.forEach(lecture => {
                if (!lecturesBySection[lecture.section]) {
                    lecturesBySection[lecture.section] = [];
                }
                lecturesBySection[lecture.section].push(lecture);
            });

            // Check each lecture for clashes within its section
            timetableData.forEach(lecture => {
                const sameSectionLectures = lecturesBySection[lecture.section] || [];
                lecture.clashing = false;

                // Get all faculty-day combinations for this lecture
                const currentFacultyDays = [];
                if (lecture.subjects) {
                    lecture.subjects.forEach(subj => {
                        if (subj.facultyDays) {
                            subj.facultyDays.forEach(fd => {
                                currentFacultyDays.push({
                                    faculty: fd.faculty,
                                    days: fd.days || []
                                });
                            });
                        }
                    });
                }

                // Compare with other lectures in the same section (different time slots)
                for (const otherLecture of sameSectionLectures) {
                    if (otherLecture === lecture) continue; // Skip self
                    if (otherLecture.timeSlot === lecture.timeSlot) continue; // Skip same time slot

                    // Get faculty-day combinations from the other lecture
                    const otherFacultyDays = [];
                    if (otherLecture.subjects) {
                        otherLecture.subjects.forEach(subj => {
                            if (subj.facultyDays) {
                                subj.facultyDays.forEach(fd => {
                                    otherFacultyDays.push({
                                        faculty: fd.faculty,
                                        days: fd.days || []
                                    });
                                });
                            }
                        });
                    }

                    // Check for faculty clashes
                    for (const currentFD of currentFacultyDays) {
                        for (const otherFD of otherFacultyDays) {
                            if (currentFD.faculty === otherFD.faculty) {
                                // If either has no days specified, they clash on all days
                                if (currentFD.days.length === 0 || otherFD.days.length === 0) {
                                    lecture.clashing = true;
                                    break;
                                }
                                
                                // Check if there's any day overlap
                                const hasOverlap = currentFD.days.some(day => otherFD.days.includes(day));
                                if (hasOverlap) {
                                    lecture.clashing = true;
                                    break;
                                }
                            }
                        }
                        if (lecture.clashing) break;
                    }
                    if (lecture.clashing) break;
                }
            });
        }

        // ============= FACULTY MANAGEMENT =============
        function manageFaculty() {
            renderFacultyList();
            document.getElementById('facultyModal').classList.add('active');
        }

        function closeFacultyModal() {
            document.getElementById('facultyModal').classList.remove('active');
        }

        function renderFacultyList() {
            const list = document.getElementById('facultyList');
            list.innerHTML = '';
            
            if (facultyList.length === 0) {
                list.innerHTML = '<p style="color: #6c757d; text-align: center;">No faculty added yet</p>';
                return;
            }

            facultyList.forEach((faculty, index) => {
                const item = document.createElement('div');
                item.style.cssText = 'display: flex; justify-content: space-between; align-items: center; padding: 10px; border-bottom: 1px solid #dee2e6;';
                item.innerHTML = `
                    <span style="font-weight: 600;">${faculty}</span>
                    <button class="remove-btn" onclick="removeFaculty(${index})">Remove</button>
                `;
                list.appendChild(item);
            });
        }

        function addFaculty() {
            const input = document.getElementById('newFacultyName');
            const name = input.value.trim();
            
            if (!name) {
                alert('Please enter a faculty name');
                return;
            }

            if (facultyList.includes(name)) {
                alert('This faculty already exists');
                return;
            }

            facultyList.push(name);
            input.value = '';
            renderFacultyList();
            populateFacultyFilter();
            saveToStorage();
        }

        function removeFaculty(index) {
            const faculty = facultyList[index];
            const isUsed = timetableData.some(lecture => 
                lecture.subjects && lecture.subjects.some(subj =>
                    subj.facultyDays && subj.facultyDays.some(fd => fd.faculty === faculty)
                )
            );

            if (isUsed) {
                if (!confirm(`${faculty} is currently assigned to lectures. Remove anyway?`)) {
                    return;
                }
            }

            facultyList.splice(index, 1);
            renderFacultyList();
            populateFacultyFilter();
            saveToStorage();
        }

        // ============= FILTERING =============
        function applyFilters() {
            const facultyFilter = document.getElementById('facultyFilter').value;
            const sectionFilter = document.getElementById('sectionFilter').value;
            const subjectFilter = document.getElementById('subjectFilter').value.toLowerCase();

            filteredData = timetableData.filter(lecture => {
                let matches = true;

                if (facultyFilter) {
                    const hasFaculty = lecture.subjects && lecture.subjects.some(subj =>
                        subj.facultyDays && subj.facultyDays.some(fd => fd.faculty === facultyFilter)
                    );
                    matches = matches && hasFaculty;
                }

                if (sectionFilter) {
                    matches = matches && lecture.section === sectionFilter;
                }

                if (subjectFilter) {
                    const hasSubject = lecture.subjects && lecture.subjects.some(subj =>
                        subj.name.toLowerCase().includes(subjectFilter)
                    );
                    matches = matches && hasSubject;
                }

                return matches;
            });

            renderTimetable();
        }

        // ============= STATISTICS =============
        function updateStats() {
            const totalLectures = timetableData.length;
            
            const allFaculty = new Set();
            timetableData.forEach(l => {
                if (l.subjects) {
                    l.subjects.forEach(s => {
                        if (s.facultyDays) {
                            s.facultyDays.forEach(fd => allFaculty.add(fd.faculty));
                        }
                    });
                }
            });
            const uniqueFaculty = allFaculty.size;
            const clashingLectures = timetableData.filter(l => l.clashing).length;
            
            const facultyCounts = {};
            timetableData.forEach(l => {
                if (l.subjects) {
                    l.subjects.forEach(s => {
                        if (s.facultyDays) {
                            s.facultyDays.forEach(fd => {
                                facultyCounts[fd.faculty] = (facultyCounts[fd.faculty] || 0) + 1;
                            });
                        }
                    });
                }
            });
            
            const maxLectures = Math.max(...Object.values(facultyCounts), 0);
            const busiestFaculty = Object.keys(facultyCounts).find(f => facultyCounts[f] === maxLectures) || 'N/A';

            document.getElementById('stats').innerHTML = `
                <div class="stat-card"><h3>Total Lectures</h3><div class="value">${totalLectures}</div></div>
                <div class="stat-card"><h3>Active Faculty</h3><div class="value">${uniqueFaculty}</div></div>
                <div class="stat-card"><h3>Clashing Schedules</h3><div class="value" style="color:${clashingLectures > 0 ? '#dc3545' : '#28a745'}">${clashingLectures}</div></div>
                <div class="stat-card"><h3>Busiest Faculty</h3><div class="value" style="font-size:18px;">${busiestFaculty}</div><small>${maxLectures} lectures</small></div>
            `;
        }

        // ============= EXPORT FUNCTIONS =============
        function generateExportTable() {
            const exportTable = document.getElementById('exportTable');
            exportTable.innerHTML = `
                <thead><tr>
                    <th class="time-col">Class / Time</th>
                    ${timeSlots.map(time => `<th class="time-col">${time}</th>`).join('')}
                </tr></thead>
            `;
            
            const tbody = document.createElement('tbody');
            sections.forEach(section => {
                const row = document.createElement('tr');
                row.innerHTML = `<td class="time-col">${section}</td>`;
                
                timeSlots.forEach((time, timeIndex) => {
                    const lecture = timetableData.find(l => l.section === section && l.timeSlot === timeIndex);
                    const cell = document.createElement('td');
                    
                    if (lecture && lecture.subjects) {
                        cell.innerHTML = lecture.subjects.map(subj => {
                            let facultyDaysHTML = '';
                            if (subj.facultyDays) {
                                facultyDaysHTML = subj.facultyDays.map(fd => {
                                    const daysStr = fd.days && fd.days.length > 0 ? ` (${fd.days.join(', ')})` : '';
                                    return `${fd.faculty}${daysStr}`;
                                }).join('<br>');
                            }
                            
                            return `
                                <div class="lecture-subject">${subj.name}</div>
                                <div class="lecture-faculty">${facultyDaysHTML}</div>
                            `;
                        }).join('<hr style="margin: 5px 0; border: none; border-top: 1px solid #ddd;">');
                    } else {
                        cell.textContent = '-';
                    }
                    row.appendChild(cell);
                });
                tbody.appendChild(row);
            });
            exportTable.appendChild(tbody);
        }

        function exportToPDF() {
            generateExportTable();
            const element = document.getElementById('exportContent');
            const opt = {
                margin: [8, 8, 8, 8],
                filename: `timetable_${new Date().toISOString().split('T')[0]}.pdf`,
                image: {type: 'jpeg', quality: 0.98},
                html2canvas: {scale: 1.5, useCORS: true},
                jsPDF: {unit: 'mm', format: 'a4', orientation: 'landscape'}
            };
            html2pdf().set(opt).from(element).save();
        }

        function exportToWord() {
            generateExportTable();
            const element = document.getElementById('exportContent');
            const content = `
                <!DOCTYPE html>
                <html><head><meta charset="UTF-8">
                <style>
                    @page {size: A4 landscape; margin: 1cm;}
                    body {font-family: Arial;}
                    .export-header {text-align: center; background: #667eea; color: white; padding: 15px; margin-bottom: 20px;}
                    table {width: 100%; border-collapse: collapse; font-size: 11px;}
                    th, td {border: 1px solid #333; padding: 8px 6px; text-align: center; vertical-align: top;}
                    th {background: #495057; color: white;}
                    .time-col {background: #e9ecef; font-weight: 600;}
                    .lecture-subject {font-weight: 700; text-transform: uppercase; margin-bottom: 3px;}
                    .lecture-faculty {font-size: 10px; color: #666;}
                </style>
                </head><body>${element.innerHTML}</body></html>
            `;
            
            const blob = new Blob(['\ufeff', content], {type: 'application/msword'});
            const url = URL.createObjectURL(blob);
            const link = document.createElement('a');
            link.href = url;
            link.download = `timetable_${new Date().toISOString().split('T')[0]}.doc`;
            link.click();
            URL.revokeObjectURL(url);
        }

        function exportToCSV() {
            let csv = 'Section,Time Slot,Subjects (Name|Faculty:Days),Clashing\n';
            timetableData.forEach(lecture => {
                const subjectsStr = lecture.subjects.map(s => {
                    const facultyStr = s.facultyDays.map(fd => {
                        const daysStr = fd.days.length > 0 ? `:${fd.days.join(',')}` : '';
                        return `${fd.faculty}${daysStr}`;
                    }).join(';');
                    return `${s.name}|${facultyStr}`;
                }).join(';;');
                
                csv += `"${lecture.section}","${timeSlots[lecture.timeSlot]}","${subjectsStr}",${lecture.clashing}\n`;
            });

            const blob = new Blob([csv], {type: 'text/csv'});
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `timetable_${new Date().toISOString().split('T')[0]}.csv`;
            a.click();
            URL.revokeObjectURL(url);
        }

        function importFromCSV() {
            document.getElementById('csvInput').click();
        }

        function handleCSVImport(event) {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(e) {
                const lines = e.target.result.split('\n').slice(1);
                const newData = [];
                
                lines.forEach(line => {
                    if (!line.trim()) return;
                    const matches = line.match(/(".*?"|[^,]+)(?=\s*,|\s*$)/g);
                    if (!matches || matches.length < 4) return;
                    
                    const section = matches[0].replace(/"/g, '');
                    const timeSlotText = matches[1].replace(/"/g, '');
                    const subjectsStr = matches[2].replace(/"/g, '');
                    
                    const timeSlot = timeSlots.indexOf(timeSlotText);
                    if (timeSlot === -1) return;
                    
                    const subjects = subjectsStr.split(';;').map(part => {
                        const [name, facultyStr] = part.split('|');
                        const facultyDays = facultyStr.split(';').map(fdPart => {
                            if (fdPart.includes(':')) {
                                const [faculty, daysStr] = fdPart.split(':');
                                return {
                                    faculty: faculty.trim(),
                                    days: daysStr.split(',').map(d => d.trim()).filter(d => d)
                                };
                            }
                            return {faculty: fdPart.trim(), days: []};
                        }).filter(fd => fd.faculty);
                        
                        return {name: name.trim(), facultyDays};
                    }).filter(s => s.name);
                    
                    if (subjects.length > 0) {
                        newData.push({section, timeSlot, subjects, clashing: false});
                    }
                });

                if (newData.length > 0) {
                    timetableData = newData;
                    recalculateAllClashing();
                    saveToStorage();
                    renderTimetable();
                    updateStats();
                    alert('Timetable imported successfully!');
                }
            };
            
            reader.readAsText(file);
            event.target.value = '';
        }

        function resetTimetable() {
            if (confirm('This will delete all lectures. Are you sure?')) {
                timetableData = [];
                saveToStorage();
                renderTimetable();
                updateStats();
            }
        }

        // ============= STORAGE =============
        function saveToStorage() {
            localStorage.setItem('timetableData', JSON.stringify(timetableData));
            localStorage.setItem('facultyList', JSON.stringify(facultyList));
        }

        function loadFromStorage() {
            const savedData = localStorage.getItem('timetableData');
            const savedFaculty = localStorage.getItem('facultyList');
            if (savedData) timetableData = JSON.parse(savedData);
            if (savedFaculty) facultyList = JSON.parse(savedFaculty);
        }

        // ============= EVENT LISTENERS =============
        document.getElementById('facultyFilter').addEventListener('change', applyFilters);
        document.getElementById('sectionFilter').addEventListener('change', applyFilters);
        document.getElementById('subjectFilter').addEventListener('input', applyFilters);

        // Initialize the application
        init();
    </script>
