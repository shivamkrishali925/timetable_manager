
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lecture Timetable Manager</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 2em;
            margin-bottom: 10px;
        }

        .header p {
            opacity: 0.9;
            font-size: 1.1em;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            padding: 30px;
            background: #f8f9fa;
        }

        .stat-card {
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            text-align: center;
            transition: transform 0.2s;
        }

        .stat-card:hover {
            transform: translateY(-5px);
        }

        .stat-card h3 {
            font-size: 2em;
            color: #667eea;
            margin-bottom: 5px;
        }

        .stat-card p {
            color: #666;
            font-size: 0.9em;
        }

        .controls {
            padding: 20px 30px;
            background: white;
            border-bottom: 1px solid #e0e0e0;
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            align-items: center;
        }

        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.95em;
            transition: all 0.3s;
            font-weight: 500;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover {
            opacity: 0.9;
            transform: translateY(-2px);
        }

        .btn-secondary {
            background: #6c757d;
            color: white;
        }

        .btn-secondary:hover {
            background: #5a6268;
        }

        .btn-success {
            background: #28a745;
            color: white;
        }

        .btn-success:hover {
            background: #218838;
        }

        .btn-danger {
            background: #dc3545;
            color: white;
        }

        .btn-danger:hover {
            background: #c82333;
        }

        .filter-group {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            flex: 1;
        }

        .filter-group select, .filter-group input {
            padding: 8px 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 0.95em;
        }

        .table-container {
            padding: 30px;
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        th, td {
            border: 1px solid #ddd;
            padding: 12px;
            text-align: left;
        }

        th {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            font-weight: 600;
            position: sticky;
            top: 0;
            z-index: 10;
        }

        td {
            min-width: 150px;
            min-height: 80px;
            vertical-align: top;
            cursor: pointer;
            transition: background 0.2s;
        }

        td:hover {
            background: #f0f0f0;
        }

        .cell-content {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .subject-item {
            background: #e7f3ff;
            padding: 8px;
            border-radius: 4px;
            border-left: 3px solid #667eea;
        }

        .subject-name {
            font-weight: 600;
            color: #333;
            margin-bottom: 4px;
        }

        .faculty-info {
            font-size: 0.85em;
            color: #666;
            display: flex;
            flex-wrap: wrap;
            gap: 4px;
        }

        .faculty-tag {
            background: #667eea;
            color: white;
            padding: 2px 8px;
            border-radius: 3px;
            font-size: 0.8em;
        }

        .days-tag {
            background: #28a745;
            color: white;
            padding: 2px 6px;
            border-radius: 3px;
            font-size: 0.75em;
        }

        .clash {
            background: #ffe6e6 !important;
            border: 2px solid #dc3545 !important;
        }

        .filtered {
            background: #fff9e6 !important;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            overflow-y: auto;
        }

        .modal-content {
            background: white;
            max-width: 600px;
            margin: 50px auto;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
            animation: slideDown 0.3s;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-50px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .modal-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 12px 12px 0 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .modal-header h2 {
            margin: 0;
        }

        .close {
            cursor: pointer;
            font-size: 1.5em;
            font-weight: bold;
            color: white;
        }

        .modal-body {
            padding: 25px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #333;
        }

        .form-group input, .form-group select, .form-group textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 0.95em;
        }

        .subjects-list {
            border: 1px solid #ddd;
            border-radius: 6px;
            padding: 15px;
            background: #f8f9fa;
        }

        .subject-entry {
            background: white;
            padding: 15px;
            border-radius: 6px;
            margin-bottom: 15px;
            border: 1px solid #ddd;
        }

        .subject-entry:last-child {
            margin-bottom: 0;
        }

        .faculty-entry {
            background: #f8f9fa;
            padding: 10px;
            border-radius: 4px;
            margin-bottom: 10px;
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .days-selector {
            display: flex;
            gap: 5px;
            margin-top: 5px;
        }

        .day-btn {
            padding: 5px 10px;
            border: 1px solid #ddd;
            background: white;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.85em;
        }

        .day-btn.active {
            background: #28a745;
            color: white;
            border-color: #28a745;
        }

        .faculty-table {
            margin-top: 20px;
        }

        .faculty-table table {
            width: 100%;
        }

        .faculty-summary {
            padding: 30px;
            background: #f8f9fa;
        }

        .save-indicator {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #28a745;
            color: white;
            padding: 10px 20px;
            border-radius: 6px;
            display: none;
            animation: fadeIn 0.3s;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @media print {
            body {
                background: white;
            }
            .controls, .stats-grid, .header p, .btn {
                display: none;
            }
            .container {
                box-shadow: none;
            }
            @page {
                size: A4 landscape;
                margin: 1cm;
            }
        }

        @media (max-width: 768px) {
            .controls {
                flex-direction: column;
            }
            .stats-grid {
                grid-template-columns: 1fr;
            }
            table {
                font-size: 0.85em;
            }
            td {
                min-width: 120px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📚 Lecture Timetable Manager</h1>
            <p>Manage your college timetable efficiently</p>
        </div>

        <div class="stats-grid">
            <div class="stat-card">
                <h3 id="totalLectures">0</h3>
                <p>Total Lectures</p>
            </div>
            <div class="stat-card">
                <h3 id="activeFaculty">0</h3>
                <p>Active Faculty</p>
            </div>
            <div class="stat-card">
                <h3 id="clashingLectures">0</h3>
                <p>Clashing Lectures</p>
            </div>
            <div class="stat-card">
                <h3 id="busiestFaculty">-</h3>
                <p>Busiest Faculty</p>
            </div>
        </div>

        <div class="controls">
            <button class="btn btn-primary" onclick="openFacultyModal()">👥 Manage Faculty</button>
            <button class="btn btn-success" onclick="exportToPDF()">📄 Export PDF</button>
            <button class="btn btn-success" onclick="exportToCSV()">📊 Export CSV</button>
            <button class="btn btn-success" onclick="exportToWord()">📝 Export Word</button>
            <button class="btn btn-secondary" onclick="document.getElementById('csvImport').click()">📥 Import CSV</button>
            <input type="file" id="csvImport" accept=".csv" style="display:none" onchange="importCSV(event)">
            
            <div class="filter-group">
                <select id="facultyFilter" onchange="applyFilters()">
                    <option value="">All Faculty</option>
                </select>
                <select id="sectionFilter" onchange="applyFilters()">
                    <option value="">All Sections</option>
                </select>
                <input type="text" id="subjectFilter" placeholder="Search Subject..." oninput="debounceFilter()">
                <button class="btn btn-secondary" onclick="clearFilters()">Clear Filters</button>
            </div>
        </div>

        <div class="table-container">
            <table id="timetable">
                <thead>
                    <tr id="headerRow"></tr>
                </thead>
                <tbody id="timetableBody"></tbody>
            </table>
        </div>

        <div class="faculty-summary">
            <h2>Faculty Summary</h2>
            <div class="faculty-table">
                <table>
                    <thead>
                        <tr>
                            <th>Faculty Name</th>
                            <th>Total Lectures</th>
                            <th>Subjects Taught</th>
                        </tr>
                    </thead>
                    <tbody id="facultySummaryBody"></tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- Lecture Modal -->
    <div id="lectureModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Manage Lecture</h2>
                <span class="close" onclick="closeLectureModal()">&times;</span>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label>Section: <span id="modalSection"></span></label>
                    <label>Time Slot: <span id="modalTimeSlot"></span></label>
                </div>
                <div class="subjects-list" id="subjectsList"></div>
                <button class="btn btn-primary" onclick="addSubject()">+ Add Subject</button>
                <div style="margin-top: 20px; display: flex; gap: 10px;">
                    <button class="btn btn-success" onclick="saveLecture()">Save</button>
                    <button class="btn btn-danger" onclick="deleteLecture()">Delete All</button>
                    <button class="btn btn-secondary" onclick="closeLectureModal()">Cancel</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Faculty Modal -->
    <div id="facultyModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Manage Faculty</h2>
                <span class="close" onclick="closeFacultyModal()">&times;</span>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label>Add New Faculty</label>
                    <input type="text" id="newFacultyName" placeholder="Enter faculty name">
                    <button class="btn btn-primary" style="margin-top: 10px" onclick="addFaculty()">Add Faculty</button>
                </div>
                <div class="form-group">
                    <label>Existing Faculty</label>
                    <div id="facultyList"></div>
                </div>
            </div>
        </div>
    </div>

    <div class="save-indicator" id="saveIndicator">Saved ✓</div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script>
        // Data Structure
        let timetableData = [];
        let facultyList = [];
        let sections = ['B.Sc Nursing Sem 1', 'B.Sc Nursing Sem 2', 'B.Sc Nursing Sem 3', 'B.Sc Nursing Sem 4', 
                        'GNM Year 1', 'GNM Year 2', 'GNM Year 3', 'ANM Year 1', 'ANM Year 2'];
        let timeSlots = ['9:00-10:00', '10:00-11:00', '11:00-12:00', '12:00-1:00', '1:00-2:00', '2:00-3:00', '3:00-4:00'];
        let currentEditCell = null;
        let filterTimeout = null;

        // Initialize
        function init() {
            loadFromStorage();
            renderTable();
            updateStats();
            updateFacultyFilter();
            updateSectionFilter();
            renderFacultySummary();
        }

        // Storage
        function loadFromStorage() {
            const saved = localStorage.getItem('timetableData');
            const savedFaculty = localStorage.getItem('facultyList');
            
            if (saved) timetableData = JSON.parse(saved);
            if (savedFaculty) facultyList = JSON.parse(savedFaculty);
            
            // Default faculty if none
            if (facultyList.length === 0) {
                facultyList = ['Dr. Smith', 'Dr. Johnson', 'Dr. Williams', 'Dr. Brown', 'Dr. Davis'];
                saveToStorage();
            }
        }

        function saveToStorage() {
            localStorage.setItem('timetableData', JSON.stringify(timetableData));
            localStorage.setItem('facultyList', JSON.stringify(facultyList));
            showSaveIndicator();
        }

        function showSaveIndicator() {
            const indicator = document.getElementById('saveIndicator');
            indicator.style.display = 'block';
            setTimeout(() => {
                indicator.style.display = 'none';
            }, 2000);
        }

        // Render Table
        function renderTable() {
            const headerRow = document.getElementById('headerRow');
            const tbody = document.getElementById('timetableBody');
            
            // Header
            headerRow.innerHTML = '<th>Section / Time</th>' + 
                timeSlots.map(slot => `<th>${slot}</th>`).join('');
            
            // Body
            tbody.innerHTML = '';
            sections.forEach(section => {
                const row = document.createElement('tr');
                row.innerHTML = `<td><strong>${section}</strong></td>`;
                
                timeSlots.forEach((slot, index) => {
                    const cell = document.createElement('td');
                    const cellData = getCellData(section, index);
                    
                    if (cellData && cellData.subjects.length > 0) {
                        const cellContent = document.createElement('div');
                        cellContent.className = 'cell-content';
                        
                        cellData.subjects.forEach(subject => {
                            const subjectDiv = document.createElement('div');
                            subjectDiv.className = 'subject-item';
                            
                            const subjectName = document.createElement('div');
                            subjectName.className = 'subject-name';
                            subjectName.textContent = subject.name;
                            subjectDiv.appendChild(subjectName);
                            
                            subject.facultyDays.forEach(fd => {
                                const facultyInfo = document.createElement('div');
                                facultyInfo.className = 'faculty-info';
                                
                                const facultyTag = document.createElement('span');
                                facultyTag.className = 'faculty-tag';
                                facultyTag.textContent = fd.faculty;
                                facultyInfo.appendChild(facultyTag);
                                
                                if (fd.days && fd.days.length > 0) {
                                    const daysTag = document.createElement('span');
                                    daysTag.className = 'days-tag';
                                    daysTag.textContent = fd.days.join(',');
                                    facultyInfo.appendChild(daysTag);
                                }
                                
                                subjectDiv.appendChild(facultyInfo);
                            });
                            
                            cellContent.appendChild(subjectDiv);
                        });
                        
                        cell.appendChild(cellContent);
                    }
                    
                    cell.onclick = () => openLectureModal(section, index);
                    
                    // Clash detection
                    if (hasClash(section, index)) {
                        cell.classList.add('clash');
                    }
                    
                    row.appendChild(cell);
                });
                
                tbody.appendChild(row);
            });
        }

        function getCellData(section, timeSlot) {
            return timetableData.find(item => 
                item.section === section && item.timeSlot === timeSlot
            );
        }

        // Clash Detection
        function hasClash(section, timeSlot) {
            const cellData = getCellData(section, timeSlot);
            if (!cellData || cellData.subjects.length === 0) return false;
            
            const facultyDayMap = {};
            
            for (const subject of cellData.subjects) {
                for (const fd of subject.facultyDays) {
                    // If no days assigned, treat as clash
                    if (!fd.days || fd.days.length === 0) {
                        return true;
                    }
                    
                    for (const day of fd.days) {
                        const key = `${fd.faculty}_${day}`;
                        if (facultyDayMap[key]) {
                            return true; // Same faculty on same day
                        }
                        facultyDayMap[key] = true;
                    }
                }
            }
            
            return false;
        }

        // Modal Functions
        function openLectureModal(section, timeSlot) {
            currentEditCell = { section, timeSlot };
            document.getElementById('modalSection').textContent = section;
            document.getElementById('modalTimeSlot').textContent = timeSlots[timeSlot];
            
            const cellData = getCellData(section, timeSlot);
            const subjectsList = document.getElementById('subjectsList');
            subjectsList.innerHTML = '';
            
            if (cellData && cellData.subjects.length > 0) {
                cellData.subjects.forEach((subject, index) => {
                    addSubjectToModal(subject, index);
                });
            } else {
                addSubjectToModal(null, 0);
            }
            
            document.getElementById('lectureModal').style.display = 'block';
        }

        function closeLectureModal() {
            document.getElementById('lectureModal').style.display = 'block';
            currentEditCell = null;
        }

        function addSubject() {
            const subjectsList = document.getElementById('subjectsList');
            const index = subjectsList.children.length;
            addSubjectToModal(null, index);
        }

        function addSubjectToModal(subject, index) {
            const subjectsList = document.getElementById('subjectsList');
            const subjectEntry = document.createElement('div');
            subjectEntry.className = 'subject-entry';
            subjectEntry.dataset.index = index;
            
            const subjectName = subject ? subject.name : '';
            
            subjectEntry.innerHTML = `
                <div class="form-group">
                    <label>Subject Name</label>
                    <input type="text" class="subject-name-input" value="${subjectName}">
                </div>
                <div class="form-group">
                    <label>Faculty & Days</label>
                    <div class="faculty-list-container"></div>
                    <button class="btn btn-primary" onclick="addFacultyEntry(${index})">+ Add Faculty</button>
                </div>
                <button class="btn btn-danger" onclick="removeSubject(${index})">Remove Subject</button>
            `;
            
            subjectsList.appendChild(subjectEntry);
            
            // Add existing faculty
            if (subject && subject.facultyDays) {
                subject.facultyDays.forEach(fd => {
                    addFacultyEntryWithData(index, fd);
                });
            } else {
                addFacultyEntryWithData(index, null);
            }
        }

        function addFacultyEntry(subjectIndex) {
            addFacultyEntryWithData(subjectIndex, null);
        }

        function addFacultyEntryWithData(subjectIndex, facultyDay) {
            const container = document.querySelectorAll('.subject-entry')[subjectIndex]
                .querySelector('.faculty-list-container');
            
            const facultyEntry = document.createElement('div');
            facultyEntry.className = 'faculty-entry';
            
            const facultySelect = document.createElement('select');
            facultySelect.className = 'faculty-select';
            facultySelect.innerHTML = '<option value="">Select Faculty</option>' +
                facultyList.map(f => `<option value="${f}" ${facultyDay && facultyDay.faculty === f ? 'selected' : ''}>${f}</option>`).join('');
            
            const daysContainer = document.createElement('div');
            daysContainer.className = 'days-selector';
            
            const days = ['M', 'T', 'W', 'Th', 'F', 'S'];
            days.forEach(day => {
                const dayBtn = document.createElement('button');
                dayBtn.className = 'day-btn';
                dayBtn.textContent = day;
                dayBtn.type = 'button';
                if (facultyDay && facultyDay.days && facultyDay.days.includes(day)) {
                    dayBtn.classList.add('active');
                }
                dayBtn.onclick = () => dayBtn.classList.toggle('active');
                daysContainer.appendChild(dayBtn);
            });
            
            const removeBtn = document.createElement('button');
            removeBtn.className = 'btn btn-danger';
            removeBtn.textContent = 'Remove';
            removeBtn.onclick = () => facultyEntry.remove();
            
            facultyEntry.appendChild(facultySelect);
            facultyEntry.appendChild(daysContainer);
            facultyEntry.appendChild(removeBtn);
            
            container.appendChild(facultyEntry);
        }

        function removeSubject(index) {
            const subjectEntry = document.querySelector(`.subject-entry[data-index="${index}"]`);
            if (subjectEntry) subjectEntry.remove();
        }

        function saveLecture() {
            if (!currentEditCell) return;
            
            const { section, timeSlot } = currentEditCell;
            const subjectEntries = document.querySelectorAll('.subject-entry');
            
            const subjects = [];
            subjectEntries.forEach(entry => {
                const subjectName = entry.querySelector('.subject-name-input').value.trim();
                if (!subjectName) return;
                
                const facultyEntries = entry.querySelectorAll('.faculty-entry');
                const facultyDays = [];
                
                facultyEntries.forEach(fe => {
                    const faculty = fe.querySelector('.faculty-select').value;
                    if (!faculty) return;
                    
                    const activeDays = Array.from(fe.querySelectorAll('.day-btn.active'))
                        .map(btn => btn.textContent);
                    
                    facultyDays.push({ faculty, days: activeDays });
                });
                
                if (facultyDays.length > 0) {
                    subjects.push({ name: subjectName, facultyDays });
                }
            });
            
            // Remove existing entry
            timetableData = timetableData.filter(item => 
                !(item.section === section && item.timeSlot === timeSlot)
            );
            
            // Add new entry if subjects exist
            if (subjects.length > 0) {
                timetableData.push({ section, timeSlot, subjects });
            }
            
            saveToStorage();
            renderTable();
            updateStats();
            renderFacultySummary();
            closeLectureModal();
        }

        function deleteLecture() {
            if (!currentEditCell) return;
            
            const { section, timeSlot } = currentEditCell;
            timetableData = timetableData.filter(item => 
                !(item.section === section && item.timeSlot === timeSlot)
            );
            
            saveToStorage();
            renderTable();
            updateStats();
            renderFacultySummary();
            closeLectureModal();
        }

        // Faculty Management
        function openFacultyModal() {
            renderFacultyList();
            document.getElementById('facultyModal').style.display = 'block';
        }

        function closeFacultyModal() {
            document.getElementById('facultyModal').style.display = 'none';
        }

        function renderFacultyList() {
            const list = document.getElementById('facultyList');
            list.innerHTML = '';
            
            facultyList.forEach(faculty => {
                const div = document.createElement('div');
                div.style.cssText = 'display: flex; justify-content: space-between; align-items: center; padding: 10px; border: 1px solid #ddd; border-radius: 6px; margin-bottom: 8px; background: white;';
                
                div.innerHTML = `
                    <span>${faculty}</span>
                    <button class="btn btn-danger" onclick="removeFaculty('${faculty}')">Delete</button>
                `;
                
                list.appendChild(div);
            });
        }

        function addFaculty() {
            const input = document.getElementById('newFacultyName');
            const name = input.value.trim();
            
            if (!name) {
                alert('Please enter a faculty name');
                return;
            }
            
            if (facultyList.includes(name)) {
                alert('Faculty already exists');
                return;
            }
            
            facultyList.push(name);
            input.value = '';
            saveToStorage();
            renderFacultyList();
            updateFacultyFilter();
        }

        function removeFaculty(faculty) {
            if (!confirm(`Remove ${faculty}? This will also remove them from all lectures.`)) return;
            
            facultyList = facultyList.filter(f => f !== faculty);
            
            // Remove from all lectures
            timetableData.forEach(item => {
                item.subjects.forEach(subject => {
                    subject.facultyDays = subject.facultyDays.filter(fd => fd.faculty !== faculty);
                });
                item.subjects = item.subjects.filter(s => s.facultyDays.length > 0);
            });
            
            timetableData = timetableData.filter(item => item.subjects.length > 0);
            
            saveToStorage();
            renderFacultyList();
            renderTable();
            updateStats();
            updateFacultyFilter();
            renderFacultySummary();
        }

        // Stats
        function updateStats() {
            const totalLectures = timetableData.reduce((sum, item) => sum + item.subjects.length, 0);
            const uniqueFaculty = new Set();
            const facultyCount = {};
            let clashes = 0;
            
            timetableData.forEach(item => {
                item.subjects.forEach(subject => {
                    subject.facultyDays.forEach(fd => {
                        uniqueFaculty.add(fd.faculty);
                        facultyCount[fd.faculty] = (facultyCount[fd.faculty] || 0) + 1;
                    });
                });
                
                if (hasClash(item.section, item.timeSlot)) {
                    clashes++;
                }
            });
            
            const busiestFaculty = Object.keys(facultyCount).length > 0
                ? Object.keys(facultyCount).reduce((a, b) => facultyCount[a] > facultyCount[b] ? a : b)
                : '-';
            
            document.getElementById('totalLectures').textContent = totalLectures;
            document.getElementById('activeFaculty').textContent = uniqueFaculty.size;
            document.getElementById('clashingLectures').textContent = clashes;
            document.getElementById('busiestFaculty').textContent = busiestFaculty;
        }

        // Filters
        function updateFacultyFilter() {
            const select = document.getElementById('facultyFilter');
            const current = select.value;
            select.innerHTML = '<option value="">All Faculty</option>' +
                facultyList.map(f => `<option value="${f}">${f}</option>`).join('');
            select.value = current;
        }

        function updateSectionFilter() {
            const select = document.getElementById('sectionFilter');
            select.innerHTML = '<option value="">All Sections</option>' +
                sections.map(s => `<option value="${s}">${s}</option>`).join('');
        }

        function debounceFilter() {
            clearTimeout(filterTimeout);
            filterTimeout = setTimeout(applyFilters, 300);
        }

        function applyFilters() {
            const facultyFilter = document.getElementById('facultyFilter').value;
            const sectionFilter = document.getElementById('sectionFilter').value;
            const subjectFilter = document.getElementById('subjectFilter').value.toLowerCase();
            
            const cells = document.querySelectorAll('#timetableBody td');
            cells.forEach(cell => {
                cell.classList.remove('filtered');
            });
            
            if (!facultyFilter && !sectionFilter && !subjectFilter) {
                return;
            }
            
            const tbody = document.getElementById('timetableBody');
            const rows = tbody.querySelectorAll('tr');
            
            rows.forEach((row, sectionIndex) => {
                const section = sections[sectionIndex];
                const cells = row.querySelectorAll('td');
                
                cells.forEach((cell, cellIndex) => {
                    if (cellIndex === 0) return; // Skip section header
                    
                    const timeSlot = cellIndex - 1;
                    const cellData = getCellData(section, timeSlot);
                    
                    if (!cellData) return;
                    
                    let matches = false;
                    
                    if (sectionFilter && section !== sectionFilter) return;
                    
                    cellData.subjects.forEach(subject => {
                        if (subjectFilter && !subject.name.toLowerCase().includes(subjectFilter)) return;
                        
                        subject.facultyDays.forEach(fd => {
                            if (facultyFilter && fd.faculty !== facultyFilter) return;
                            matches = true;
                        });
                    });
                    
                    if (matches) {
                        cell.classList.add('filtered');
                    }
                });
            });
        }

        function clearFilters() {
            document.getElementById('facultyFilter').value = '';
            document.getElementById('sectionFilter').value = '';
            document.getElementById('subjectFilter').value = '';
            applyFilters();
        }

        // Faculty Summary
        function renderFacultySummary() {
            const tbody = document.getElementById('facultySummaryBody');
            tbody.innerHTML = '';
            
            const facultyStats = {};
            
            timetableData.forEach(item => {
                item.subjects.forEach(subject => {
                    subject.facultyDays.forEach(fd => {
                        if (!facultyStats[fd.faculty]) {
                            facultyStats[fd.faculty] = {
                                count: 0,
                                subjects: new Set()
                            };
                        }
                        facultyStats[fd.faculty].count++;
                        facultyStats[fd.faculty].subjects.add(subject.name);
                    });
                });
            });
            
            Object.keys(facultyStats).sort().forEach(faculty => {
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td>${faculty}</td>
                    <td>${facultyStats[faculty].count}</td>
                    <td>${Array.from(facultyStats[faculty].subjects).join(', ')}</td>
                `;
                tbody.appendChild(row);
            });
        }

        // Export Functions
        function exportToPDF() {
            const element = document.querySelector('.container');
            const opt = {
                margin: 10,
                filename: 'timetable.pdf',
                image: { type: 'jpeg', quality: 0.98 },
                html2canvas: { scale: 2 },
                jsPDF: { unit: 'mm', format: 'a4', orientation: 'landscape' }
            };
            html2pdf().set(opt).from(element).save();
        }

        function exportToCSV() {
            let csv = 'Section,Time Slot,Subject,Faculty,Days\n';
            
            timetableData.forEach(item => {
                item.subjects.forEach(subject => {
                    subject.facultyDays.forEach(fd => {
                        const days = fd.days.join(';');
                        csv += `${item.section},${timeSlots[item.timeSlot]},${subject.name},${fd.faculty},${days}\n`;
                    });
                });
            });
            
            const blob = new Blob([csv], { type: 'text/csv' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'timetable.csv';
            a.click();
        }

        function exportToWord() {
            let html = `
                <html xmlns:o='urn:schemas-microsoft-com:office:office' xmlns:w='urn:schemas-microsoft-com:office:word' xmlns='http://www.w3.org/TR/REC-html40'>
                <head><meta charset='utf-8'><title>Timetable</title></head>
                <body>
                <h1>Lecture Timetable</h1>
                ${document.getElementById('timetable').outerHTML}
                </body>
                </html>
            `;
            
            const blob = new Blob(['\ufeff', html], {
                type: 'application/msword'
            });
            
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'timetable.doc';
            a.click();
        }

        function importCSV(event) {
            const file = event.target.files[0];
            if (!file) return;
            
            const reader = new FileReader();
            reader.onload = function(e) {
                const text = e.target.result;
                const lines = text.split('\n');
                
                if (!lines[0].includes('Section,Time Slot,Subject,Faculty,Days')) {
                    alert('Invalid CSV format. Expected: Section,Time Slot,Subject,Faculty,Days');
                    return;
                }
                
                timetableData = [];
                
                for (let i = 1; i < lines.length; i++) {
                    const line = lines[i].trim();
                    if (!line) continue;
                    
                    const parts = line.split(',');
                    if (parts.length < 5) continue;
                    
                    const section = parts[0];
                    const timeSlot = timeSlots.indexOf(parts[1]);
                    const subjectName = parts[2];
                    const faculty = parts[3];
                    const days = parts[4] ? parts[4].split(';') : [];
                    
                    if (timeSlot === -1) continue;
                    
                    let existing = timetableData.find(item => 
                        item.section === section && item.timeSlot === timeSlot
                    );
                    
                    if (!existing) {
                        existing = { section, timeSlot, subjects: [] };
                        timetableData.push(existing);
                    }
                    
                    let subject = existing.subjects.find(s => s.name === subjectName);
                    if (!subject) {
                        subject = { name: subjectName, facultyDays: [] };
                        existing.subjects.push(subject);
                    }
                    
                    subject.facultyDays.push({ faculty, days });
                }
                
                saveToStorage();
                renderTable();
                updateStats();
                renderFacultySummary();
                alert('Import successful!');
            };
            
            reader.readAsText(file);
            event.target.value = '';
        }

        // Initialize on load
        window.onload = init;
    </script>
</body>
</html>
